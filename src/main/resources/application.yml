spring:
  application:
    name: chat-app

  datasource:
    url: jdbc:h2:mem:chatdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: my-secret-key-for-jwt-token-generation-and-validation
  expiration: 86400000

file:
  upload-dir: uploads/

logging:
  level:
    root: INFO
    com.chat: DEBUG
